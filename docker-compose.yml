version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 7jemty-backend
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

  flutter:
    build:
      context: ./frontEnd-mobile
      dockerfile: Dockerfile
    container_name: 7jemty-flutter
    ports:
      - "8080:8080"
    volumes:
      - ./frontEnd-mobile:/app
      # Cache Flutter's internal directories to avoid overriding from host
      - /app/.dart_tool
      - /app/build
      - /app/linux
      - /app/windows
      - /app/macos
    restart: unless-stopped

