# fly.toml app configuration file generated for 7jemty on 2026-03-12T16:35:25Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = '7jemty'
primary_region = 'iad'

[build]
  [build.args]
    NODE_ENV = "production"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
