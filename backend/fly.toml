# fly.toml - Fly.io configuration for 7jemty backend
app = "7jemty"
primary_region = "cdg" # Paris (closest to Tunisia)

[build]
  dockerfile = "Dockerfile"

[build.args]
  NODE_ENV = "production"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
